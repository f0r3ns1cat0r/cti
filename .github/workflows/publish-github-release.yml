name: Publish GitHub Release

on:
  push:
    tags:
      - "ATT&CK-v*"

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG_NAME: ${{ github.ref_name }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v4

      - name: Publish release from tag
        run: |
          VERSION="${TAG_NAME#ATT&CK-v}"
          NOTES="See release notes and version history for ATT&CK [here](https://attack.mitre.org/resources/versions/)"

          gh release create "${TAG_NAME}" \
            enterprise-attack/enterprise-attack.json \
            mobile-attack/mobile-attack.json \
            ics-attack/ics-attack.json \
            --repo "${REPOSITORY}" \
            --verify-tag \
            --title "ATT&CK version ${VERSION}" \
            --notes "${NOTES}"
